name: scan-images

on:
  schedule:
    - cron: "0 12 * * 1"

# Remove all permissions from GH_TOKEN except metadata.
permissions: {}

jobs:
  scan:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
    - name: Setup go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag=v6.4.0
      with:
        go-version: 1.26.4
    - name: Run verify container script
      run: make verify-container-images
